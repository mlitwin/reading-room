name: ReadingRoom
options:
  bundleIdPrefix: org.antoninus.readingroom
configs:
  Debug: debug
  Release: release
settings:
  SWIFT_VERSION: 5.10
  IPHONEOS_DEPLOYMENT_TARGET: 18.5
  DEAD_CODE_STRIPPING: YES
  ALWAYS_SEARCH_USER_PATHS: NO

targets:
  ReadingRoom:
    type: application
    platform: iOS
    deploymentTarget: "18.5"
    sources:
      - path: ReadingRoom
    info:
      path: ReadingRoom/Info.plist
      properties:
        CFBundleShortVersionString: "0.1.9"
        CFBundleVersion: "10"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        CFBundleDevelopmentRegion: "en"
        CFBundleLocalizations:
          - "en"
        # App uses HTTPS only via system URLSession — qualifies for the
        # standard exemption, declared here so TestFlight uploads don't
        # prompt for export-compliance on every build.
        ITSAppUsesNonExemptEncryption: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.antoninus.readingroom.app
      PRODUCT_NAME: ReadingRoom
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 352K435X8J
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEAD_CODE_STRIPPING: YES

schemes:
  ReadingRoom:
    build:
      targets:
        ReadingRoom: all
