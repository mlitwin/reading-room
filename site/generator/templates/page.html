<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{title}} — Reading Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="./assets/katex.min.css">
<link rel="stylesheet" href="./assets/highlight.css">
<link rel="stylesheet" href="./assets/reader.css">
</head>
<body>
<header class="site">
  <a href="./index.html" class="home">Reading Room</a>
</header>
<article>
  <header class="piece">
    <h1>{{title}}</h1>
    <div class="meta">
      <span class="author">{{author}}</span>
      <time>{{date}}</time>
      <span class="tags">{{tags}}</span>
    </div>
  </header>
  <div class="body">
{{body}}
  </div>
  <footer class="piece">
    <a href="./{{mdPath}}">View markdown source</a>
  </footer>
</article>
</body>
</html>
