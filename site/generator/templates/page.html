<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{title}} — Reading Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="asset-prefix" content="{{assetPrefix}}">
<link rel="stylesheet" href="{{assetPrefix}}assets/katex.min.css">
<link rel="stylesheet" href="{{assetPrefix}}assets/highlight.css">
<link rel="stylesheet" href="{{assetPrefix}}assets/reader.css">
<script src="{{assetPrefix}}assets/notes.js" defer></script>
<script src="{{assetPrefix}}assets/cards.js" defer></script>
</head>
<body>
<header class="site">
  <a href="{{assetPrefix}}index.html" class="home">Reading Room</a>
</header>
<article>
{{breadcrumb}}
  <header class="piece">
    <h1>{{title}}</h1>
    <div class="meta">
      <span class="author">{{author}}</span>
      <time>{{date}}</time>
      <span class="tags">{{tags}}</span>
    </div>
  </header>
  <div class="body">
{{body}}
  </div>
{{pagenav}}
</article>
</body>
</html>
